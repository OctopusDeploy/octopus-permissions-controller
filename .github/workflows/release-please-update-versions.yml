name: Update release versions
on:
  push:
    branches:
      - release-please--branches--main

permissions:
  contents: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHA_TOKEN }}

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(jq -r '."."' .release-please-manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update versions and rebuild installer
        run: |
          VERSION=${{ steps.version.outputs.version }}
          make build-installer IMG=octopusdeploy/octopus-permissions-controller:v${VERSION}
          sed -i "s|tag: \"v[0-9]*\.[0-9]*\.[0-9]*\"|tag: \"v${VERSION}\"|" dist/chart/values.yaml
          sed -i "s|^version: .*|version: ${VERSION}|" dist/chart/Chart.yaml
          sed -i "s|^appVersion: .*|appVersion: \"v${VERSION}\"|" dist/chart/Chart.yaml

      - name: Commit and push if changed
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/manager/kustomization.yaml dist/install.yaml dist/chart/values.yaml dist/chart/Chart.yaml
          git diff --staged --quiet || git commit -m "chore: update versions to v${VERSION}"
          git push
