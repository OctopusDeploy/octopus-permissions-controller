{{- if .Values.webhook.enable }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    {{- if .Values.certManager.enable }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "octopus-permissions-controller.resourceName" (dict "suffix" "serving-cert" "context" $) }}
    {{- end }}
  name: {{ include "octopus-permissions-controller.resourceName" (dict "suffix" "validating-webhook-configuration" "context" $) }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include "octopus-permissions-controller.resourceName" (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-agent-octopus-com-v1beta1-workloadserviceaccount
  failurePolicy: Fail
  name: vworkloadserviceaccount-v1beta1.kb.io
  rules:
  - apiGroups:
    - agent.octopus.com
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    resources:
    - workloadserviceaccounts
  sideEffects: None
{{- end }}
